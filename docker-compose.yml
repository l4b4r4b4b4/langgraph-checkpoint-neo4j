# Local development stack — Neo4j for checkpoint tests
# Usage: docker compose up -d
#        docker compose down -v  (to wipe data)

services:
  neo4j:
    image: neo4j:2026-community
    container_name: langgraph-checkpoint-neo4j
    ports:
      - "7373:7474" # HTTP (Neo4j Browser)
      - "7387:7687" # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: "[]"
      NEO4J_dbms_security_procedures_unrestricted: "*"
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ministral:
    profiles:
      - local-ai
    deploy:
      replicas: ${MINISTRAL_REPLICAS:-0}
    image: vllm/vllm-openai:latest
    container_name: ministral
    ports:
      - "${MINISTRAL_PORT:-7374}:80"
    volumes:
      - hf_cache:/.hf_cache
    devices:
      - nvidia.com/gpu=all
    device_cgroup_rules:
      - "c 195:* rmw"
      - "c 236:* rmw"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HUGGINGFACEHUB_API_TOKEN:-your_hf_api_access_token}
      - HF_HOME=/.hf_cache
      - VLLM_ATTENTION_BACKEND=FLASHINFER
      - HF_HUB_ENABLE_HF_TRANSFER=1
      - MAX_PARALLEL_LOADING_WORKERS=4
    ipc: host
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: no
    env_file:
      - .env.local
    command:
      [
        "mistralai/Ministral-3-3B-Instruct-2512",
        "--host",
        "0.0.0.0",
        "--port",
        "80",
        "--served-model-name",
        "ministral-3b-instruct",
        "--max-model-len",
        "8192",
        "--max-num-batched-tokens",
        "8192",
        "--kv-cache-dtype",
        "fp8",
        "--enable-auto-tool-choice",
        "--tool-call-parser",
        "mistral",
        "--gpu-memory-utilization",
        "0.75",
        "--seed",
        "4272",
        "--max-num-seqs",
        "1",
        "--trust-remote-code",
      ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "1"

volumes:
  neo4j-data:
  neo4j-logs:
