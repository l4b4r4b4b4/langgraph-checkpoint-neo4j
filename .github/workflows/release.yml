name: Release

on:
  push:
    tags:
      - "python-v*"
      - "ts-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Determine what's being released ─────────────────────────────────
  meta:
    name: Release Meta
    runs-on: ubuntu-latest
    outputs:
      component: ${{ steps.parse.outputs.component }}
      version: ${{ steps.parse.outputs.version }}
      python: ${{ steps.parse.outputs.python }}
      ts: ${{ steps.parse.outputs.ts }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}"

          # Initialize all outputs to false
          echo "python=false" >> "$GITHUB_OUTPUT"
          echo "ts=false" >> "$GITHUB_OUTPUT"

          if [[ "$TAG" == python-v* ]]; then
            VERSION="${TAG#python-v}"
            echo "component=python" >> "$GITHUB_OUTPUT"
            echo "python=true" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == ts-v* ]]; then
            VERSION="${TAG#ts-v}"
            echo "component=ts" >> "$GITHUB_OUTPUT"
            echo "ts=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Unknown tag format: ${TAG}"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing: component=${TAG%%-v*}, version=${VERSION}"

  # ── Python: Verify, Build, Publish to PyPI ──────────────────────────
  publish-python:
    name: "Python / Publish to PyPI"
    runs-on: ubuntu-latest
    needs: meta
    if: needs.meta.outputs.python == 'true'
    environment: pypi
    defaults:
      run:
        working-directory: packages/python
    permissions:
      contents: read
      id-token: write

    services:
      neo4j:
        image: neo4j:2026-community
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/password
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Verify version matches tag
        run: |
          TOML_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${{ needs.meta.outputs.version }}"
          if [[ "$TOML_VERSION" != "$TAG_VERSION" ]]; then
            echo "❌ Version mismatch: pyproject.toml=${TOML_VERSION}, tag=${TAG_VERSION}"
            exit 1
          fi
          echo "✅ Version verified: ${TAG_VERSION}"

      - name: Sync dependencies
        run: uv sync --quiet

      - name: Run linting
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Wait for Neo4j
        run: |
          echo "Waiting for Neo4j to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:7474 > /dev/null 2>&1; then
              echo "Neo4j is ready!"
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done

      - name: Run tests
        run: uv run pytest -v --tb=short

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/

  # ── TypeScript: Verify, Build, Publish to npm ───────────────────────
  publish-ts:
    name: "TypeScript / Publish to npm"
    runs-on: ubuntu-latest
    needs: meta
    if: needs.meta.outputs.ts == 'true'
    environment: npm
    defaults:
      run:
        working-directory: packages/ts
    permissions:
      contents: read

    services:
      neo4j:
        image: neo4j:2026-community
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/password
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Verify version matches tag and publishability
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          TAG_VERSION="${{ needs.meta.outputs.version }}"
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "❌ Version mismatch: package.json=${PKG_VERSION}, tag=${TAG_VERSION}"
            exit 1
          fi

          PKG_NAME=$(jq -r '.name' package.json)
          if [[ "$PKG_NAME" != "@langgraph/checkpoint-neo4j" ]]; then
            echo "❌ Unexpected package name for npm publish: ${PKG_NAME}"
            exit 1
          fi

          PKG_PRIVATE=$(jq -r '.private // false' package.json)
          if [[ "$PKG_PRIVATE" == "true" ]]; then
            echo "❌ package.json has private=true. Refusing npm publish."
            exit 1
          fi

          echo "✅ Version and publishability verified: ${TAG_VERSION}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Wait for Neo4j
        run: |
          echo "Waiting for Neo4j to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:7474 > /dev/null 2>&1; then
              echo "Neo4j is ready!"
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done

      - name: Run Bun smoke tests
        run: bun run test:bun

      - name: Run upstream validation suite (Vitest/Node)
        run: bun x vitest run --config vitest.config.ts

      - name: Build
        run: bun run build

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [meta, publish-python, publish-ts]
    if: always() && needs.meta.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check job results
        run: |
          # Check which jobs ran and whether any failed
          PY="${{ needs.publish-python.result }}"
          TS="${{ needs.publish-ts.result }}"

          for JOB_RESULT in "$PY" "$TS"; do
            if [[ "$JOB_RESULT" == "failure" ]]; then
              echo "❌ A release job failed — skipping GitHub release"
              exit 1
            fi
          done

          echo "✅ Release succeeded for ${{ needs.meta.outputs.component }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ needs.meta.outputs.component }} v${{ needs.meta.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.meta.outputs.version, 'alpha') || contains(needs.meta.outputs.version, 'beta') || contains(needs.meta.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
