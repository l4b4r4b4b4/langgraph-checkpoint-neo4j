name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [feature, main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Change Detection ──────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      ts: ${{ steps.filter.outputs.ts }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'packages/python/**'
            ts:
              - 'packages/ts/**'
              - '.bun-version'
            root:
              - 'package.json'
              - 'lefthook.yml'
              - '.github/workflows/ci.yml'
              - 'docker-compose.yml'

  # ── Python: Lint ──────────────────────────────────────────────────────
  lint-python:
    name: "Python / Lint"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.root == 'true'
    defaults:
      run:
        working-directory: packages/python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --quiet

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # ── Python: Test ──────────────────────────────────────────────────────
  test-python:
    name: "Python / Test"
    runs-on: ubuntu-latest
    needs: [changes, lint-python]
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.root == 'true'
    defaults:
      run:
        working-directory: packages/python

    services:
      neo4j:
        image: neo4j:5-community
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/password
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --quiet

      - name: Wait for Neo4j
        run: |
          echo "Waiting for Neo4j to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:7474 > /dev/null 2>&1; then
              echo "Neo4j is ready!"
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done

      - name: Run pytest with coverage
        run: >
          uv run pytest -v --tb=short
          --cov --cov-fail-under=72 --no-cov-on-fail
          --cov-report=xml
          --cov-report=term-missing:skip-covered

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: packages/python/coverage.xml
          retention-days: 30

  # ── TypeScript: Lint ──────────────────────────────────────────────────
  lint-ts:
    name: "TypeScript / Lint"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ts == 'true' || needs.changes.outputs.root == 'true'
    defaults:
      run:
        working-directory: packages/ts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Verify Bun version matches .bun-version
        working-directory: .
        run: bun run check:bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

  # ── TypeScript: Test ──────────────────────────────────────────────────
  test-ts:
    name: "TypeScript / Test"
    runs-on: ubuntu-latest
    needs: [changes, lint-ts]
    if: needs.changes.outputs.ts == 'true' || needs.changes.outputs.root == 'true'
    defaults:
      run:
        working-directory: packages/ts

    services:
      neo4j:
        image: neo4j:5-community
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/password
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Wait for Neo4j
        run: |
          echo "Waiting for Neo4j to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:7474 > /dev/null 2>&1; then
              echo "Neo4j is ready!"
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done

      - name: Run tests
        run: bun test

  # ── Summary Gate ──────────────────────────────────────────────────────
  # Branch protection should require this single job.
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - lint-python
      - test-python
      - lint-ts
      - test-ts
    steps:
      - name: Check all required jobs
        run: |
          echo "=== Job Results ==="
          echo "changes:      ${{ needs.changes.result }}"
          echo "lint-python:  ${{ needs.lint-python.result }}"
          echo "test-python:  ${{ needs.test-python.result }}"
          echo "lint-ts:      ${{ needs.lint-ts.result }}"
          echo "test-ts:      ${{ needs.test-ts.result }}"
          echo ""

          # changes must succeed
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "❌ Change detection failed"; exit 1
          fi

          # Each job must be success or skipped (skipped = no changes for that package)
          FAILED=0
          for result_pair in \
            "lint-python:${{ needs.lint-python.result }}" \
            "test-python:${{ needs.test-python.result }}" \
            "lint-ts:${{ needs.lint-ts.result }}" \
            "test-ts:${{ needs.test-ts.result }}"; do
            job="${result_pair%%:*}"
            result="${result_pair#*:}"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ $job: $result"
              FAILED=1
            fi
          done

          if [[ "$FAILED" == "1" ]]; then
            exit 1
          fi

          echo ""
          echo "✅ All CI checks passed!"
