[project]
name = "langgraph-checkpoint-neo4j"
version = "0.0.0"
description = "Neo4j checkpointer for LangGraph — drop-in replacement for the Postgres checkpointer, backed by Neo4j"
authors = [
    { name = "Lucas Hänke de Cansino", email = "lucas.cansino@mail.de" },
]
license = "MIT"
readme = "README.md"
requires-python = ">=3.11,<4.0"
keywords = ["langgraph", "neo4j", "checkpoint", "checkpointer", "persistence", "graph-database"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Database",
]
dependencies = [
    "langgraph-checkpoint>=2.0.0",
    "neo4j>=5.0.0",
]

[project.urls]
Homepage = "https://github.com/l4b4r4b4b4/langgraph-checkpoint-neo4j"
Repository = "https://github.com/l4b4r4b4b4/langgraph-checkpoint-neo4j"
Issues = "https://github.com/l4b4r4b4b4/langgraph-checkpoint-neo4j/issues"

[build-system]
requires = ["setuptools>=75.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
include = ["langgraph.checkpoint.neo4j*"]

[tool.setuptools.package-data]
"langgraph.checkpoint.neo4j" = ["py.typed"]

[dependency-groups]
dev = [
    "langchain>=1.2.13",
    "langchain-anthropic>=1.4.0",
    "langchain-openai>=1.1.12",
    "langgraph>=1.1.3",
    "langgraph-checkpoint-conformance>=0.0.1",
    "pytest>=8.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "ruff>=0.8.4",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
norecursedirs = [".venv", "__pycache__", "vendor"]
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = ["langgraph.checkpoint.neo4j"]
omit = ["*/tests/*"]

[tool.coverage.report]
fail_under = 60
show_missing = true
skip_empty = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
    "@abstractmethod",
]

[tool.ruff]
src = ["src"]
exclude = [
    ".ruff_cache",
    ".venv",
    "__pycache__",
    "vendor",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "T20",  # flake8-print
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",     # line too long — handled by formatter
    "RUF012",   # mutable class attributes — used in LangGraph patterns
]

[tool.ruff.lint.per-file-ignores]
"examples/**/*.py" = ["T201"]  # examples intentionally use print()

[tool.ruff.lint.isort]
known-first-party = ["langgraph"]
